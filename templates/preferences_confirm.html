<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préférences enregistrées</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f3f4f6; margin: 0; padding: 2rem 1rem; color: #111827; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 520px; margin: 0 auto; padding: 2rem; text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.2rem; margin: 0 0 0.75rem; }
        p { color: #6b7280; font-size: 0.9rem; margin: 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✓</div>
    <h1>Préférences enregistrées</h1>
    <p>Merci {{ contact.prenom }}, vos choix ont bien été pris en compte.</p>
</div>
</body>
</html>
