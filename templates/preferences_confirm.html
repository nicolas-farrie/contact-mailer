<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préférences enregistrées</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f3f4f6; margin: 0; padding: 2rem 1rem; color: #111827; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 520px; margin: 0 auto; padding: 2rem; text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { font-size: 1.2rem; margin: 0 0 0.75rem; }
        p { color: #6b7280; font-size: 0.9rem; margin: 0; }
        .btn-review { display: inline-block; margin-top: 1.25rem; padding: 0.55rem 1.1rem; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; }
        .btn-review:hover { background: #1d4ed8; }
        .note { margin-top: 0.85rem; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✓</div>
    <h1>Préférences enregistrées</h1>
    <p>Merci {{ contact.prenom }}, vos choix ont bien été pris en compte.</p>
    <a href="{{ url_for('formulaires.public', form_token=form.token, contact_uid=contact.uid) }}" class="btn-review">Revoir mes choix</a>
    <p class="note">Vous pouvez rouvrir cette page à tout moment depuis le lien reçu par email.</p>
</div>
</body>
</html>
