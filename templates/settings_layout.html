{% extends "base.html" %}
{% block container_class %}container-wide{% endblock %}

{% block content %}
<div class="settings-layout">

    <aside class="settings-sidebar">
        <div class="settings-sidebar-label">Configuration</div>
        <nav class="settings-sidebar-nav">
            <a href="{{ url_for('settings.index') }}"
               class="{% if active_tab == 'general' %}active{% endif %}">
                <span>Paramètres</span>
            </a>
            <a href="{{ url_for('api_integrations.seafile') }}"
               class="{% if active_tab == 'seafile' %}active{% endif %}">
                <span>Seafile</span>
                {% if not config.SEAFILE_URL %}
                <span class="settings-warn-dot" title="Non configuré"></span>
                {% endif %}
            </a>
            <a href="{{ url_for('api_integrations.bookstack') }}"
               class="{% if active_tab == 'bookstack' %}active{% endif %}">
                <span>BookStack</span>
                {% if not config.BOOKSTACK_URL %}
                <span class="settings-warn-dot" title="Non configuré"></span>
                {% endif %}
            </a>
        </nav>
    </aside>

    <div class="settings-content">
        {% block settings_content %}{% endblock %}
    </div>

</div>
{% endblock %}
