services:
  app:
    # En production : image depuis le registry
    image: ghcr.io/nicolas-farrie/contact-mailer:latest
    # En dev local : commenter la ligne image et décommenter build
    # build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Toujours restreindre à 127.0.0.1 : Docker publie les ports via iptables,
      # ce qui contourne UFW (qui ne filtre pas la chaîne DOCKER). Nginx
      # reverse-proxy ce port loopback en HTTPS.
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data:/app/data
      - ./data/uploads:/app/static/uploads