# Utilisé en dev local : docker compose -f docker-compose.dev.yml up
services:
  app:
    build: .
    restart: "no"
    ports:
      # Cf. docker-compose.yml : restreindre à 127.0.0.1 (Docker contourne UFW sinon)
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data:/app/data
      # Hot-reload du code sans rebuild (pratique en dev)
      - ./app.py:/app/app.py
      - ./models.py:/app/models.py
      - ./config.py:/app/config.py
      - ./mailer.py:/app/mailer.py
      - ./imap_submissions.py:/app/imap_submissions.py
      - ./templates:/app/templates
      - ./static:/app/static
    env_file:
      - .env