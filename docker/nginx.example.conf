# contact-mailer - configuration Nginx
# Copier dans /etc/nginx/sites-available/ et adapter
#
# Prérequis :
#   1. Certificat SSL : sudo certbot certonly --nginx -d listes.example.com
#   2. Container Docker en écoute sur le port défini dans docker-compose.yml (défaut: 8100)
#      Vérifier que ce port est libre : ss -tlnp | grep 8100
#
# Activer le site :
#   sudo ln -s /etc/nginx/sites-available/contact-mailer.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name listes.example.com;   # ← adapter

    ssl_certificate     /etc/letsencrypt/live/listes.example.com/fullchain.pem;   # ← adapter
    ssl_certificate_key /etc/letsencrypt/live/listes.example.com/privkey.pem;     # ← adapter
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5m;   # limite pièces jointes (doit correspondre à MAX_CONTENT_LENGTH Flask)

    location / {
        proxy_pass http://127.0.0.1:8100;   # ← port du docker-compose.yml
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  443;
        proxy_read_timeout 300s;   # timeout gunicorn (--timeout 300)
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name listes.example.com;   # ← adapter
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
